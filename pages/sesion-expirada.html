<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesión Expirada - Taller del Roble Colombiano</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="modal-overlay" role="alert">
    <div class="exp-box">
      <div class="exp-icon">
        <i class="fas fa-clock"></i>
      </div>
      <h2>Sesión expirada</h2>
      <p>Tu sesión ha expirado por inactividad después de <strong>30 minutos</strong>. Por seguridad, hemos cerrado tu sesión automáticamente.</p>

      <div class="alert alert-success" style="text-align: left;">
        <span class="alert-icon"><i class="fas fa-floppy-disk"></i></span>
        <div><strong>Tu trabajo ha sido guardado automáticamente.</strong></div>
      </div>

      <a href="../index.html" class="btn btn-primary btn-lg btn-full">
        <i class="fas fa-right-to-bracket"></i> Volver a iniciar sesión
      </a>

      <div style="margin-top: var(--spacing-lg); font-size: 12px; color: var(--color-text-muted);">
        Taller del Roble Colombiano - Sistema de gestión
      </div>
    </div>
  </div>
</body>
</html>
