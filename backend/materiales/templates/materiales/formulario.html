<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Material . Taller del Roble Colombiano</title>
</head>
<body>
    <h1>Registrar nuevo material</h1>
    
    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}

    <!-- method="post" -->
     <form action="{% url 'materiales:registrar' %}" method="post">
        {% csrf_token %}

        <label for="nombre_material">Nombre del material:</label><br/>
        <input type="text" id="nombre_material" name="nombre_material" required><br/><br/>

        <label for="tipo_material">Tipo de material:</label><br/>
        <input type="text" id="tipo_material" name="tipo_material" required><br/><br/>

        <label for="unidad_medida">Unidad de medida:</label><br/>
        <input type="text" id="unidad_medida" name="unidad_medida" required><br/><br/>

        <label for="costo_unitario">Costo unitario:</label><br/>
        <input type="number" step="0.01" id="costo_unitario" name="costo_unitario" required><br/><br/>

        <label for="stock">Stock inicial:</label><br/>
        <input type="number" step="0.01" id="stock" name="stock" required><br/><br/>

        <label for="stock_minimo">Stock minimo:</label><br/>
        <input type="number" step="0.01" id="stock_minimo" name="stock_minimo" required><br/><br/>

        <button type="submit">Guardar material</button>
     </form>

     <br/>
     <a href="{% url 'materiales:lista' %}">Ver lista materiales</a>
</body>
</html>
